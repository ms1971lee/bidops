spring:
  profiles:
    active: local

  application:
    name: bidops-api

  datasource:
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

bidops:
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-dir: ${STORAGE_LOCAL_DIR:./storage}
    bucket: ${STORAGE_BUCKET:bidops-dev}
    base-url: ${STORAGE_BASE_URL:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
    presigned-expiry-minutes: ${STORAGE_PRESIGNED_EXPIRY:60}
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-production}
    jwt-expiry-ms: ${JWT_EXPIRY_MS:86400000}
  ai:
    openai-api-key: ${BIDOPS_AI_OPENAI_API_KEY:}
    openai-model: ${BIDOPS_AI_OPENAI_MODEL:gpt-4o-2024-11-20}
    openai-base-url: ${BIDOPS_AI_OPENAI_BASE_URL:https://api.openai.com/v1}
    max-text-length: ${AI_MAX_TEXT_LENGTH:80000}
  azure-di:
    endpoint: ${AZURE_DI_ENDPOINT:}
    api-key: ${AZURE_DI_API_KEY:}
    enabled: ${AZURE_DI_ENABLED:false}

logging:
  level:
    com.bidops: DEBUG
    org.hibernate.SQL: WARN
