spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:bidops_test;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

bidops:
  storage:
    provider: local
    local-dir: ./build/test-storage
    bucket: test
    base-url: http://localhost:8080
  security:
    jwt-secret: test-secret-key-for-integration-tests-only-32chars!!
    jwt-expiry-ms: 86400000
  ai:
    openai-api-key: test-key
    openai-model: gpt-4o
  azure-di:
    endpoint: http://localhost
    api-key: test
    enabled: false

logging:
  level:
    com.bidops: DEBUG
    org.hibernate.SQL: DEBUG
