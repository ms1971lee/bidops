name: CI - BidOps API

on:
  push:
    branches: [ master, main ]
    paths:
      - 'bidops-api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'bidops-api/**'
      - '.github/workflows/ci.yml'

jobs:
  # ── 핵심 테스트 (H2) — 필수 통과 ────────────────────────────────
  test-h2:
    name: Core Tests (H2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('bidops-api/**/*.gradle*', 'bidops-api/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: bidops-api
        run: chmod +x ./gradlew

      - name: Run H2 tests (exclude PostgresContractTest)
        working-directory: bidops-api
        run: ./gradlew clean test --exclude-task :test -PexcludePostgres=true || true

      - name: Run H2 tests
        working-directory: bidops-api
        run: |
          ./gradlew clean test \
            --tests "com.bidops.auth.*" \
            --tests "com.bidops.domain.*" \
            --tests "com.bidops.integration.Api*" \
            --tests "com.bidops.integration.Authorization*" \
            --tests "com.bidops.integration.Checklist*" \
            --tests "com.bidops.integration.Inquiry*" \
            --tests "com.bidops.integration.Requirement*"

      - name: Test Summary
        working-directory: bidops-api
        if: always()
        run: |
          echo "## Core Test Results (H2)" >> $GITHUB_STEP_SUMMARY
          for f in build/test-results/test/TEST-*.xml; do
            name=$(basename "$f" .xml | sed 's/TEST-com.bidops.//')
            tests=$(grep -oE 'tests="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+')
            failures=$(grep -oE 'failures="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+')
            if [ "$failures" != "0" ]; then
              echo "- ❌ $name: $tests tests, $failures failures" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ $name: $tests tests" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-h2
          path: bidops-api/build/reports/tests/test/
          retention-days: 7

  # ── PostgreSQL 호환성 테스트 — 실패해도 CI 녹색 ──────────────────
  test-postgres:
    name: PostgreSQL Compat (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('bidops-api/**/*.gradle*', 'bidops-api/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: bidops-api
        run: chmod +x ./gradlew

      - name: Run PostgreSQL Testcontainers tests
        working-directory: bidops-api
        run: ./gradlew test --tests "com.bidops.integration.PostgresContractTest"

      - name: PostgreSQL Test Summary
        working-directory: bidops-api
        if: always()
        run: |
          echo "## PostgreSQL Compat Results" >> $GITHUB_STEP_SUMMARY
          XML="build/test-results/test/TEST-com.bidops.integration.PostgresContractTest.xml"
          if [ -f "$XML" ]; then
            tests=$(grep -oE 'tests="[0-9]+"' "$XML" | head -1 | grep -oE '[0-9]+')
            failures=$(grep -oE 'failures="[0-9]+"' "$XML" | head -1 | grep -oE '[0-9]+')
            skipped=$(grep -oE 'skipped="[0-9]+"' "$XML" | head -1 | grep -oE '[0-9]+')
            echo "- Tests: $tests, Failures: $failures, Skipped: $skipped" >> $GITHUB_STEP_SUMMARY
            if [ "$failures" != "0" ]; then
              echo '### Failure Details' >> $GITHUB_STEP_SUMMARY
              echo '```xml' >> $GITHUB_STEP_SUMMARY
              grep -B2 -A30 '<failure' "$XML" >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- PostgresContractTest XML not found (likely skipped)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload PG test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-postgres
          path: bidops-api/build/test-results/test/TEST-com.bidops.integration.PostgresContractTest.xml
          retention-days: 7
