name: CI - BidOps API

on:
  push:
    branches: [ master, main ]
    paths:
      - 'bidops-api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'bidops-api/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('bidops-api/**/*.gradle*', 'bidops-api/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: bidops-api
        run: chmod +x ./gradlew

      - name: Run all tests
        working-directory: bidops-api
        run: ./gradlew clean test --stacktrace 2>&1 | tee /tmp/gradle-output.txt; exit ${PIPESTATUS[0]}

      - name: Show Gradle failure output
        if: failure()
        run: |
          echo '## Gradle Failure Output (last 100 lines)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/gradle-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test Summary
        working-directory: bidops-api
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          for f in build/test-results/test/TEST-*.xml; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .xml | sed 's/TEST-com.bidops.//')
            tests=$(grep -oE 'tests="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+')
            failures=$(grep -oE 'failures="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+')
            if [ "$failures" != "0" ]; then
              echo "### ❌ $name ($failures failures)" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -B2 -A20 '<failure' "$f" >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ $name: $tests tests" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: bidops-api/build/reports/tests/test/
          retention-days: 7
