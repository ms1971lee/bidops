openapi: 3.1.0
info:
  title: BidOps API
  version: 0.1.0
  summary: BidOps MVP OpenAPI 1차 초안
  description: >
    공공/민간 입찰·제안 업무를 위한 근거 기반 RFP 분석 및 수주 운영 시스템 API.
    문서 업로드 → 비동기 분석 → 요구사항 검토 → 체크리스트/질의/산출물 관리 흐름을 기준으로 정의한다.

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Projects
  - name: Documents
  - name: AnalysisJobs
  - name: Requirements
  - name: RequirementAnalysis
  - name: Checklists
  - name: Queries
  - name: Artifacts
  - name: Dashboard
  - name: SourceExcerpts
  - name: AuditLogs

security:
  - bearerAuth: []

paths:
  /projects:
    get:
      tags: [Projects]
      summary: 프로젝트 목록 조회
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - in: query
          name: keyword
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ProjectStatus' }
      responses:
        '200':
          description: 프로젝트 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectListResponse' }
    post:
      tags: [Projects]
      summary: 프로젝트 생성
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectCreateRequest' }
      responses:
        '201':
          description: 프로젝트 생성 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }

  /projects/{projectId}:
    get:
      tags: [Projects]
      summary: 프로젝트 상세 조회
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 프로젝트 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }
    patch:
      tags: [Projects]
      summary: 프로젝트 수정
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectUpdateRequest' }
      responses:
        '200':
          description: 프로젝트 수정 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }

  /projects/{projectId}/status:
    post:
      tags: [Projects]
      summary: 프로젝트 상태 변경
      operationId: changeProjectStatus
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectStatusChangeRequest' }
      responses:
        '200':
          description: 상태 변경 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }

  /projects/{projectId}/documents:
    get:
      tags: [Documents]
      summary: 문서 목록 조회
      operationId: listDocuments
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/DocumentType' }
        - in: query
          name: parse_status
          schema: { $ref: '#/components/schemas/DocumentParseStatus' }
      responses:
        '200':
          description: 문서 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentListResponse' }
    post:
      tags: [Documents]
      summary: 문서 업로드
      operationId: uploadDocument
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, type]
              properties:
                file: { type: string, format: binary }
                type: { $ref: '#/components/schemas/DocumentType' }
                version_note: { type: string }
      responses:
        '201':
          description: 문서 업로드 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentResponse' }

  /projects/{projectId}/documents/{documentId}:
    get:
      tags: [Documents]
      summary: 문서 상세 조회
      operationId: getDocument
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: 문서 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentResponse' }
    delete:
      tags: [Documents]
      summary: 문서 삭제
      operationId: deleteDocument
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: 문서 삭제 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }

  /projects/{projectId}/documents/{documentId}/versions:
    get:
      tags: [Documents]
      summary: 문서 버전 목록 조회
      operationId: listDocumentVersions
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: 문서 버전 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentVersionListResponse' }

  /projects/{projectId}/analysis-jobs:
    get:
      tags: [AnalysisJobs]
      summary: 프로젝트 기준 최신 Job 목록
      operationId: listAnalysisJobs
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: job_type
          schema: { $ref: '#/components/schemas/AnalysisJobType' }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/AnalysisJobStatus' }
      responses:
        '200':
          description: 분석 Job 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalysisJobListResponse' }
    post:
      tags: [AnalysisJobs]
      summary: 분석 시작
      operationId: createAnalysisJob
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnalysisJobCreateRequest' }
      responses:
        '201':
          description: 분석 Job 생성
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalysisJobResponse' }

  /projects/{projectId}/analysis-jobs/{jobId}:
    get:
      tags: [AnalysisJobs]
      summary: Job 상태 조회
      operationId: getAnalysisJob
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: 분석 Job 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalysisJobResponse' }

  /projects/{projectId}/requirements:
    get:
      tags: [Requirements]
      summary: 요구사항 목록 조회
      operationId: listRequirements
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - in: query
          name: category
          schema: { $ref: '#/components/schemas/RequirementCategory' }
        - in: query
          name: mandatory
          schema: { type: boolean }
        - in: query
          name: evidence_required
          schema: { type: boolean }
        - in: query
          name: analysis_status
          schema: { $ref: '#/components/schemas/RequirementAnalysisStatus' }
        - in: query
          name: review_status
          schema: { $ref: '#/components/schemas/RequirementReviewStatus' }
        - in: query
          name: fact_level
          schema: { $ref: '#/components/schemas/FactLevel' }
        - in: query
          name: query_needed
          schema: { type: boolean }
        - in: query
          name: keyword
          schema: { type: string }
      responses:
        '200':
          description: 요구사항 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementListResponse' }

  /projects/{projectId}/requirements/{requirementId}:
    get:
      tags: [Requirements]
      summary: 요구사항 상세 조회
      operationId: getRequirement
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      responses:
        '200':
          description: 요구사항 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementDetailResponse' }
    patch:
      tags: [Requirements]
      summary: 요구사항 기본 정보 수정
      operationId: updateRequirement
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementUpdateRequest' }
      responses:
        '200':
          description: 요구사항 수정 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementDetailResponse' }

  /projects/{projectId}/requirements/{requirementId}/sources:
    get:
      tags: [Requirements]
      summary: 요구사항 원문 근거 조회
      operationId: getRequirementSources
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      responses:
        '200':
          description: 원문 근거 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementSourcesResponse' }

  /projects/{projectId}/requirements/{requirementId}/analysis:
    get:
      tags: [RequirementAnalysis]
      summary: 요구사항 분석 조회
      operationId: getRequirementAnalysis
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      responses:
        '200':
          description: 요구사항 분석 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementAnalysisResponse' }
    patch:
      tags: [RequirementAnalysis]
      summary: 요구사항 분석 수정
      operationId: updateRequirementAnalysis
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementAnalysisUpdateRequest' }
      responses:
        '200':
          description: 요구사항 분석 수정 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementAnalysisResponse' }

  /projects/{projectId}/requirements/{requirementId}/review-status:
    post:
      tags: [RequirementAnalysis]
      summary: 요구사항 검토 상태 변경
      operationId: changeRequirementReviewStatus
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementReviewStatusChangeRequest' }
      responses:
        '200':
          description: 검토 상태 변경 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementAnalysisResponse' }

  /projects/{projectId}/requirements/{requirementId}/reanalyze:
    post:
      tags: [RequirementAnalysis]
      summary: 요구사항 단건 재분석 (Insight만 갱신, Review 유지)
      operationId: reanalyzeRequirementInsight
      description: >
        특정 requirement 1건만 재분석한다.
        RequirementInsight만 갱신하고 RequirementReview는 변경하지 않는다.
        AnalysisJob에 REQUIREMENT_INSIGHT_REANALYZE 타입으로 이력을 남긴다.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
      responses:
        '200':
          description: 재분석 Job 생성 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RequirementReanalyzeResponse'
        '400':
          description: 원문 근거(SourceExcerpt) 없음
        '404':
          description: 요구사항 미존재 또는 projectId 불일치

  /projects/{projectId}/requirements/{requirementId}/reanalyze-history:
    get:
      tags: [RequirementAnalysis]
      summary: 재분석 이력 목록 조회 (최대 10건)
      operationId: getReanalyzeHistory
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RequirementId'
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        '200':
          description: 재분석 이력 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AnalysisJob'

  /projects/{projectId}/checklists:
    get:
      tags: [Checklists]
      summary: 체크리스트 목록 조회
      operationId: listChecklistItems
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/ChecklistType' }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ChecklistStatus' }
        - in: query
          name: risk_level
          schema: { $ref: '#/components/schemas/RiskLevel' }
        - in: query
          name: owner_user_id
          schema: { type: string }
        - in: query
          name: mandatory
          schema: { type: boolean }
        - in: query
          name: keyword
          schema: { type: string, description: "항목 텍스트 검색 (LIKE)" }
        - in: query
          name: requirement_id
          schema: { type: string }
      responses:
        '200':
          description: 체크리스트 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChecklistItemListResponse' }
    post:
      tags: [Checklists]
      summary: 체크리스트 항목 생성
      operationId: createChecklistItem
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChecklistItemCreateRequest' }
      responses:
        '201':
          description: 체크리스트 항목 생성 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChecklistItemResponse' }

  /projects/{projectId}/checklists/{checklistItemId}:
    patch:
      tags: [Checklists]
      summary: 체크리스트 항목 수정
      operationId: updateChecklistItem
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ChecklistItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChecklistItemUpdateRequest' }
      responses:
        '200':
          description: 체크리스트 항목 수정 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChecklistItemResponse' }

  /projects/{projectId}/checklists/generate:
    post:
      tags: [Checklists]
      summary: 체크리스트 자동 생성 실행
      operationId: generateChecklist
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChecklistGenerateRequest' }
      responses:
        '202':
          description: 체크리스트 자동 생성 Job 생성
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalysisJobResponse' }

  /projects/{projectId}/queries:
    get:
      tags: [Queries]
      summary: 질의 필요 항목 목록 조회
      operationId: listQueries
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/QueryStatus' }
      responses:
        '200':
          description: 질의 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueryListResponse' }
    post:
      tags: [Queries]
      summary: 질의 항목 저장
      operationId: createQuery
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryCreateRequest' }
      responses:
        '201':
          description: 질의 저장 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueryResponse' }

  /projects/{projectId}/queries/generate:
    post:
      tags: [Queries]
      summary: 질의 초안 생성
      operationId: generateQueries
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryGenerateRequest' }
      responses:
        '202':
          description: 질의 초안 생성 Job 생성
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalysisJobResponse' }

  /projects/{projectId}/queries/{queryId}:
    patch:
      tags: [Queries]
      summary: 질의 상태 변경
      operationId: updateQuery
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/QueryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryUpdateRequest' }
      responses:
        '200':
          description: 질의 상태 변경 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueryResponse' }

  /projects/{projectId}/artifacts:
    get:
      tags: [Artifacts]
      summary: 산출물 목록 조회
      operationId: listArtifacts
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 산출물 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactListResponse' }
    post:
      tags: [Artifacts]
      summary: 산출물 생성
      operationId: createArtifact
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtifactCreateRequest' }
      responses:
        '201':
          description: 산출물 생성 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactResponse' }

  /projects/{projectId}/artifacts/{artifactId}:
    get:
      tags: [Artifacts]
      summary: 산출물 상세
      operationId: getArtifact
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactResponse' }
    patch:
      tags: [Artifacts]
      summary: 산출물 수정
      operationId: updateArtifact
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtifactUpdateRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactResponse' }
    delete:
      tags: [Artifacts]
      summary: 산출물 삭제
      operationId: deleteArtifact
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: 삭제 완료

  /projects/{projectId}/artifacts/{artifactId}/status:
    post:
      tags: [Artifacts]
      summary: 산출물 상태 변경
      operationId: changeArtifactStatus
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/ArtifactStatus' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactResponse' }

  /projects/{projectId}/artifacts/{artifactId}/versions:
    get:
      tags: [Artifacts]
      summary: 버전 목록
      operationId: listArtifactVersions
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactVersionListResponse' }
    post:
      tags: [Artifacts]
      summary: 버전 업로드
      operationId: uploadArtifactVersion
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                version_note: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtifactVersionResponse' }

  /projects/{projectId}/dashboard:
    get:
      tags: [Dashboard]
      summary: 프로젝트 분석 요약 조회
      operationId: getProjectDashboard
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 프로젝트 대시보드
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardResponse' }

  /projects/{projectId}/audit-logs:
    get:
      tags: [AuditLogs]
      summary: 감사로그 목록 조회
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - in: query
          name: actor_user_id
          schema: { type: string }
        - in: query
          name: action_type
          schema: { type: string }
        - in: query
          name: target_type
          schema: { type: string }
        - in: query
          name: date_from
          schema: { type: string, format: date-time }
        - in: query
          name: date_to
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: 감사로그 목록
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditLogListResponse' }

  /source-excerpts/{id}:
    get:
      tags: [SourceExcerpts]
      summary: SourceExcerpt 단건 조회
      operationId: getSourceExcerpt
      description: >
        source_excerpt_id 로 원문 발췌 블록을 직접 조회한다.
        document_id 가 포함되어 프론트에서 PDF URL 해석에 사용할 수 있다.
        호출자는 해당 문서가 속한 프로젝트의 DOCUMENT_VIEW 권한이 필요하다.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: SourceExcerpt 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceExcerptDetailResponse' }
        '404':
          description: 원문 발췌 블록을 찾을 수 없음

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema: { type: string }
    DocumentId:
      in: path
      name: documentId
      required: true
      schema: { type: string }
    JobId:
      in: path
      name: jobId
      required: true
      schema: { type: string }
    RequirementId:
      in: path
      name: requirementId
      required: true
      schema: { type: string }
    ChecklistItemId:
      in: path
      name: checklistItemId
      required: true
      schema: { type: string }
    QueryId:
      in: path
      name: queryId
      required: true
      schema: { type: string }
    ArtifactId:
      in: path
      name: artifactId
      required: true
      schema: { type: string }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    Size:
      in: query
      name: size
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

  schemas:
    Meta:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        total_count: { type: integer }
      additionalProperties: true

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    SuccessResponse:
      type: object
      required: [success, data, meta, error]
      properties:
        success: { type: boolean, const: true }
        data: { type: object, additionalProperties: true }
        meta: { $ref: '#/components/schemas/Meta' }
        error: { type: 'null' }

    ProjectStatus:
      type: string
      enum: [DRAFT, READY, ANALYZING, REVIEWING, SUBMISSION_PREP, CLOSED]
    DocumentParseStatus:
      type: string
      enum: [UPLOADED, PARSING, PARSED, FAILED]
    ExcerptType:
      type: string
      enum: [PARAGRAPH, TABLE, LIST, HEADER, FOOTNOTE]
    AnalysisJobStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED]
    RequirementCategory:
      type: string
      enum: [FUNCTIONAL, NON_FUNCTIONAL, SCHEDULE, STAFFING, EXPERIENCE, SECURITY, EVALUATION, DELIVERABLE, ETC]
    FactLevel:
      type: string
      enum: [FACT, INFERENCE, REVIEW_NEEDED]
    RequirementAnalysisStatus:
      type: string
      enum: [EXTRACTED, ENRICHED, REVIEW_NEEDED]
    RequirementReviewStatus:
      type: string
      enum: [NOT_REVIEWED, IN_REVIEW, APPROVED, HOLD, NEEDS_UPDATE]
    ChecklistStatus:
      type: string
      enum: [TODO, IN_PROGRESS, DONE, BLOCKED]
    RiskLevel:
      type: string
      enum: [NONE, LOW, MEDIUM, HIGH]
    QueryStatus:
      type: string
      enum: [DRAFT, REVIEWING, SENT, ANSWERED, CLOSED]
    DocumentType:
      type: string
      enum: [RFP, ANNEX, FORM, QNA, PROPOSAL_REFERENCE]
    AnalysisJobType:
      type: string
      enum: [OCR, PARSE, REQUIREMENT_EXTRACTION, CHECKLIST_BUILD, QUERY_BUILD, ARTIFACT_BUILD, SEARCH_INDEX, RFP_PARSE, REQUIREMENT_INSIGHT_REANALYZE]
    ChecklistType:
      type: string
      enum: [SUBMISSION, EVALUATION, EVIDENCE]
    AssetType:
      type: string
      enum: [PROPOSAL, DESIGN, PLAN, REPORT, EVIDENCE, PRESENTATION, ETC]
      description: 산출물 유형
    ArtifactStatus:
      type: string
      enum: [DRAFT, IN_PROGRESS, REVIEW, APPROVED, SUBMITTED]
      description: 산출물 상태

    Project:
      type: object
      required: [id, name, client_name, business_name, status, created_by, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        client_name: { type: string }
        business_name: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        description: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Document:
      type: object
      required: [id, project_id, type, file_name, storage_path, version, parse_status, uploaded_by, uploaded_at]
      properties:
        id: { type: string }
        project_id: { type: string }
        type: { $ref: '#/components/schemas/DocumentType' }
        file_name: { type: string }
        storage_path: { type: string }
        version: { type: integer }
        version_note: { type: string }
        parse_status: { $ref: '#/components/schemas/DocumentParseStatus' }
        page_count: { type: integer, nullable: true, description: "PDF 전체 페이지 수 (파싱 완료 후 채워짐)" }
        uploaded_by: { type: string }
        uploaded_at: { type: string, format: date-time }
        viewer_url: { type: string, description: "PDF 열기/다운로드 URL" }

    AnalysisJob:
      type: object
      required: [id, project_id, document_id, job_type, status]
      properties:
        id: { type: string }
        project_id: { type: string }
        document_id: { type: string }
        job_type: { $ref: '#/components/schemas/AnalysisJobType' }
        status: { $ref: '#/components/schemas/AnalysisJobStatus' }
        progress: { type: integer, minimum: 0, maximum: 100 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        error_code: { type: string }
        error_message: { type: string }

    Requirement:
      type: object
      required: [id, project_id, document_id, requirement_code, original_text, category, mandatory_flag, evidence_required_flag, analysis_status]
      properties:
        id: { type: string }
        project_id: { type: string }
        document_id: { type: string }
        source_excerpt_id: { type: string }
        requirement_code: { type: string }
        title: { type: string }
        original_text: { type: string }
        category: { $ref: '#/components/schemas/RequirementCategory' }
        mandatory_flag: { type: boolean }
        evidence_required_flag: { type: boolean }
        confidence_score: { type: number, format: float }
        analysis_status: { $ref: '#/components/schemas/RequirementAnalysisStatus' }
        review_status: { $ref: '#/components/schemas/RequirementReviewStatus' }
        fact_level: { $ref: '#/components/schemas/FactLevel' }
        query_needed: { type: boolean }
        page_refs:
          type: array
          items: { type: integer }
        clause_refs:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RequirementInsight:
      type: object
      required: [requirement_id, fact_level, review_status]
      properties:
        requirement_id: { type: string }
        fact_summary: { type: string }
        interpretation_summary: { type: string }
        intent_summary: { type: string }
        proposal_point: { type: string }
        implementation_approach: { type: string }
        expected_deliverables:
          type: array
          items: { type: string }
        differentiation_point: { type: string }
        risk_note:
          type: array
          items: { type: string }
        query_needed: { type: boolean }
        fact_level: { $ref: '#/components/schemas/FactLevel' }
        review_status: { $ref: '#/components/schemas/RequirementReviewStatus' }
        reviewed_by_user_id: { type: string }
        reviewed_at: { type: string, format: date-time }
        generated_by_job_id: { type: string }

    RequirementDetail:
      type: object
      required: [requirement, analysis]
      properties:
        requirement: { $ref: '#/components/schemas/Requirement' }
        analysis: { $ref: '#/components/schemas/RequirementInsight' }

    SourceExcerpt:
      type: object
      required: [id, page_no, excerpt_type, raw_text]
      properties:
        id:
          type: string
          description: SourceExcerpt ID
        page_no:
          type: integer
          description: 페이지 번호 (1-based)
        excerpt_type:
          type: string
          enum: [PARAGRAPH, TABLE, LIST, HEADER, FOOTNOTE]
          description: 발췌 유형
        anchor_label:
          type: string
          description: 조항 번호 (예 3.2.1, 제4조)
        raw_text:
          type: string
          description: 원문 텍스트
        normalized_text:
          type: string
          description: 정규화된 텍스트
        bbox_json:
          type: string
          description: "페이지 내 위치 좌표 JSON (% 단위). 예: {\"x\":5.9,\"y\":6.0,\"w\":88.2,\"h\":3.6}"
        link_type:
          type: string
          enum: [PRIMARY, SUPPORTING]
          description: "근거 연결 유형. PRIMARY: 핵심 원문, SUPPORTING: 보조 근거"

    RequirementSources:
      type: object
      required: [page_refs, clause_refs, source_text_blocks]
      properties:
        page_refs:
          type: array
          items: { type: integer }
        clause_refs:
          type: array
          items: { type: string }
        source_text_blocks:
          type: array
          items: { $ref: '#/components/schemas/SourceExcerpt' }

    ChecklistItem:
      type: object
